<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>釜山溫德姆奢華舒壓之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #map { height: 100%; width: 100%; z-index: 1; background: #e5e7eb; }
        
        /* 手機版地圖容器樣式控制 */
        .mobile-map-active #mobile-map-container {
            display: block !important;
            position: absolute;
            inset: 0;
            z-index: 40;
        }
        .mobile-map-active #itinerary-panel {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 h-[100dvh] flex flex-col overflow-hidden text-slate-800">

    <header class="bg-white shadow-sm z-50 flex-none relative">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between mb-2">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-slate-900 truncate">釜山溫德姆奢華舒壓之旅</h1>
                    <p class="text-xs md:text-sm text-slate-500 mt-1">
                        <i class="fa-solid fa-hotel text-indigo-600 mr-1"></i> 松島 Wyndham Grand
                    </p>
                </div>
            </div>
        </div>

        <div class="border-t border-gray-200">
            <div class="max-w-7xl mx-auto px-4">
                <nav class="flex space-x-6 overflow-x-auto no-scrollbar pb-1" aria-label="Tabs">
                    <button onclick="switchDay(1)" id="tab-1" class="tab-btn whitespace-nowrap py-3 px-1 border-b-2 border-indigo-500 font-medium text-sm text-indigo-600 transition-colors">Day 1 抵達</button>
                    <button onclick="switchDay(2)" id="tab-2" class="tab-btn whitespace-nowrap py-3 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 transition-colors">Day 2 松島</button>
                    <button onclick="switchDay(3)" id="tab-3" class="tab-btn whitespace-nowrap py-3 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 transition-colors">Day 3 文化</button>
                    <button onclick="switchDay(4)" id="tab-4" class="tab-btn whitespace-nowrap py-3 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 transition-colors">Day 4 海雲臺</button>
                    <button onclick="switchDay(5)" id="tab-5" class="tab-btn whitespace-nowrap py-3 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 transition-colors">Day 5 賦歸</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative w-full">
        
        <div id="itinerary-panel" class="w-full md:w-[480px] lg:w-[550px] overflow-y-auto bg-gray-50 p-4 pb-24 z-10 shadow-xl flex-none scroll-smooth">
            
            <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 mb-6 rounded-r-lg shadow-sm">
                <p class="text-sm text-indigo-900 font-medium leading-relaxed" id="day-summary">
                    載入中...
                </p>
            </div>

            <div id="itinerary-content" class="space-y-5"></div>
            <div class="h-12"></div>
        </div>

        <div id="mobile-map-container" class="hidden md:block flex-1 relative bg-gray-200">
            <div id="map"></div>
            
            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur p-3 rounded-lg shadow-lg w-40 z-[1000] border border-gray-200 text-xs">
                <div class="font-bold text-gray-500 mb-2">圖標說明</div>
                <div class="space-y-2">
                    <div class="flex items-center"><span class="w-5 h-5 rounded bg-indigo-600 text-white flex items-center justify-center mr-2"><i class="fa-solid fa-h"></i></span> 飯店</div>
                    <div class="flex items-center"><span class="w-5 h-5 rounded bg-blue-500 text-white flex items-center justify-center mr-2">1</span> 景點</div>
                    <div class="flex items-center"><span class="w-5 h-5 rounded bg-orange-500 text-white flex items-center justify-center mr-2"><i class="fa-solid fa-utensils"></i></span> 餐廳</div>
                </div>
            </div>
        </div>

        <button onclick="toggleMobileMap()" id="map-toggle-btn" class="md:hidden absolute bottom-6 right-6 bg-indigo-600 text-white w-14 h-14 rounded-full shadow-2xl z-50 flex items-center justify-center hover:bg-indigo-700 transition active:scale-95">
            <i class="fa-solid fa-map-location-dot text-xl"></i>
        </button>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        const tripData = {
            1: {
                summary: "抵達釜山，直接前往飯店，省去轉乘搬運之苦。享受全客房海景的第一晚。",
                center: [35.1000, 128.9800], zoom: 11,
                items: [
                    { time: "16:00", title: "金海國際機場 (PUS)", desc: "領取行李、於大廳換匯。", type: "transport", image: "https://images.unsplash.com/photo-1570214476695-ca264c17379d?auto=format&fit=crop&w=600&q=80" },
                    { time: "17:00", title: "機場 ➔ Wyndham Grand", desc: "推薦交通：舒適專車接送。耗時約 40-50 分鐘。", price: "₩25,000", note: "省去提行李轉乘地鐵的疲憊。", type: "car", icon: "fa-car" },
                    { time: "17:30", title: "入住：Wyndham Grand", desc: "松島全新五星飯店，全客房海景。", type: "hotel", image: "https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=600&q=80" },
                    { time: "晚餐", title: "The Bridge (飯店4F)", desc: "頂級海鮮自助餐，不用出門最輕鬆。", price: "₩110,000", type: "food", image: "https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=600&q=80" }
                ]
            },
            2: {
                summary: "上午步行漫遊松島，下午前往南浦洞逛街，感受釜山熱鬧氣息。",
                center: [35.0850, 129.0250], zoom: 13,
                items: [
                    { time: "10:00", title: "松島海上纜車", desc: "飯店步行即達。建議搭乘「水晶車廂」俯瞰大海。", type: "sight", image: "https://images.unsplash.com/photo-1534234828569-16d22b0f4496?auto=format&fit=crop&w=600&q=80" },
                    { time: "11:30", title: "EL16.52 Cafe", desc: "纜車站旁絕美海景咖啡廳。", type: "food", image: "https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=600&q=80" },
                    { time: "移動", title: "松島 ➔ 南浦洞", desc: "短程移動，計程車最方便。", price: "₩7,000", type: "car", icon: "fa-taxi" },
                    { time: "13:30", title: "南浦洞 & 札嘎其", desc: "午餐推薦：札嘎其烤魚。下午逛 BIFF 廣場。", type: "food", image: "https://images.unsplash.com/photo-1580910547703-9d06b3a32f01?auto=format&fit=crop&w=600&q=80" }
                ]
            },
            3: {
                summary: "今日前往山坡景點，計程車是保留體力的必要投資。",
                center: [35.0900, 129.0300], zoom: 13,
                items: [
                    { time: "10:00", title: "甘川洞文化村", desc: "釜山的馬丘比丘。尋找小王子雕像。", type: "sight", image: "https://images.unsplash.com/photo-1596417770176-d39b03ae2803?auto=format&fit=crop&w=600&q=80" },
                    { time: "移動", title: "飯店 ➔ 甘川洞", desc: "強烈建議計程車直達入口，省去爬坡。", price: "₩6,500", note: "公車需轉乘且大排長龍。", type: "car", icon: "fa-taxi" },
                    { time: "14:00", title: "白淺灘文化村", desc: "沿著絕壁海岸線的白色村莊。", type: "sight", image: "https://images.unsplash.com/photo-1516053351989-d4c398332155?auto=format&fit=crop&w=600&q=80" }
                ]
            },
            4: {
                summary: "今日距離最遠，前往海雲臺。提供舒適與省錢兩種方案。",
                center: [35.1500, 129.1300], zoom: 12,
                items: [
                    {
                        time: "移動", title: "飯店 ➔ 海雲臺", desc: "跨區移動方案比較", type: "comparison",
                        options: [
                            { name: "舒壓推薦", tag: "舒適", price: "₩28,000", details: "計程車直達，約 50 分鐘。", color: "text-indigo-400" },
                            { name: "省錢方案", tag: "高CP", price: "₩6,000", details: "計程車至南浦站 ➔ 地鐵1號線 ➔ 西面轉2號線 ➔ 中洞站", color: "text-green-400" }
                        ]
                    },
                    { time: "11:00", title: "天空膠囊列車", desc: "務必提前2週預約 (尾浦出發)。", type: "sight", image: "https://images.unsplash.com/photo-1548115184-bc6544d06a58?auto=format&fit=crop&w=600&q=80" },
                    { time: "午餐", title: "海木 (Haemok)", desc: "海雲臺必吃鰻魚飯，建議先抽號碼牌。", type: "food", image: "https://images.unsplash.com/photo-1560159752-d6d7c4b0d355?auto=format&fit=crop&w=600&q=80" }
                ]
            },
            5: {
                summary: "享受飯店設施到最後一刻。退房後行李寄放櫃台。",
                center: [35.0760, 129.0170], zoom: 14,
                items: [
                    { time: "11:00", title: "退房 & 寄放行李", desc: "完美結算。松島公園散步。", type: "hotel", image: "https://images.unsplash.com/photo-1618773928121-c32242e63f39?auto=format&fit=crop&w=600&q=80" },
                    { time: "15:00", title: "最後的海景咖啡", desc: "飯店附近咖啡廳，整理心情。", price: "₩25,000", type: "food", icon: "fa-mug-hot" },
                    { time: "16:30", title: "前往金海機場", desc: "帶著滿滿的回憶賦歸。", type: "transport", image: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=600&q=80" }
                ]
            }
        };

        // 地圖初始化 (加入錯誤處理)
        let map;
        try {
            map = L.map('map', { zoomControl: false }).setView([35.1000, 129.0300], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '', maxZoom: 19
            }).addTo(map);
            
            // 標記飯店
            const hotelIcon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div style='background-color:#4f46e5; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow:0 0 0 4px rgba(79, 70, 229, 0.3);'></div>",
                iconSize: [20, 20]
            });
            L.marker([35.0788, 129.0180], {icon: hotelIcon}).addTo(map);
        } catch (e) {
            console.log("Map failed to load", e);
        }

        function switchDay(day) {
            // 1. 先處理文字內容 (確保這部分一定會執行)
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-indigo-500', 'text-indigo-600');
                btn.classList.add('border-transparent', 'text-gray-500');
            });
            document.getElementById(`tab-${day}`).classList.replace('border-transparent', 'border-indigo-500');
            document.getElementById(`tab-${day}`).classList.replace('text-gray-500', 'text-indigo-600');
            
            document.getElementById('day-summary').textContent = tripData[day].summary;

            const container = document.getElementById('itinerary-content');
            container.innerHTML = ''; 

            tripData[day].items.forEach((item, index) => {
                let cardHtml = '';
                if (item.type === 'comparison') {
                    cardHtml = `
                        <div class="bg-slate-800 text-white rounded-xl p-4 shadow-lg fade-in border border-slate-700">
                            <h3 class="font-bold text-base mb-3 flex items-center"><i class="fa-solid fa-route text-yellow-400 mr-2"></i> ${item.title}</h3>
                            <div class="space-y-3">
                                ${item.options.map(opt => `
                                    <div class="bg-slate-700/50 rounded-lg p-3 border border-slate-600">
                                        <div class="flex justify-between items-center mb-1">
                                            <span class="font-bold text-sm ${opt.color}">${opt.name}</span>
                                            <span class="bg-slate-600 text-white text-xs px-2 py-0.5 rounded">${opt.price}</span>
                                        </div>
                                        <p class="text-xs text-slate-300">${opt.details}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                } else if (item.type === 'car' || (item.type === 'transport' && item.icon)) {
                    cardHtml = `
                        <div class="bg-white rounded-xl p-4 shadow-md flex items-start gap-3 fade-in border-l-4 border-slate-600">
                            <div class="flex-shrink-0 mt-1"><i class="fa-solid ${item.icon || 'fa-car'} text-lg text-slate-600"></i></div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-bold text-base text-slate-800">${item.title}</h3>
                                    ${item.price ? `<span class="bg-slate-100 text-slate-700 text-xs font-bold px-2 py-1 rounded">${item.price}</span>` : ''}
                                </div>
                                <p class="text-gray-600 text-sm mt-1">${item.desc}</p>
                            </div>
                        </div>`;
                } else {
                    cardHtml = `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden fade-in border border-gray-100 flex h-32 md:h-auto">
                            ${item.image ? `<div class="w-32 md:w-32 h-full relative flex-shrink-0"><img src="${item.image}" class="absolute inset-0 w-full h-full object-cover"></div>` : ''}
                            <div class="p-3 flex-1 flex flex-col justify-center min-w-0">
                                <div class="text-xs font-bold text-gray-400 mb-1">${item.time}</div>
                                <h3 class="font-bold text-base text-slate-800 mb-1 truncate">${item.title}</h3>
                                <p class="text-gray-600 text-xs md:text-sm line-clamp-2">${item.desc}</p>
                                ${item.price ? `<div class="mt-2 text-indigo-600 font-bold text-xs">${item.price}</div>` : ''}
                            </div>
                        </div>`;
                }
                container.insertAdjacentHTML('beforeend', cardHtml);
            });

            // 2. 最後才處理地圖 (如果失敗不影響上面文字顯示)
            if (map && tripData[day].center) {
                // 如果是手機版且地圖隱藏中，不要飛，避免報錯
                const isMobileMapHidden = document.getElementById('mobile-map-container').classList.contains('hidden');
                if (!isMobileMapHidden || window.innerWidth >= 768) {
                    try {
                        map.flyTo(tripData[day].center, tripData[day].zoom, { animate: true, duration: 1.5 });
                        map.invalidateSize(); // 確保地圖尺寸正確
                    } catch(e) {}
                }
            }
        }

        // 手機版：切換地圖/列表模式
        function toggleMobileMap() {
            document.body.classList.toggle('mobile-map-active');
            const mapContainer = document.getElementById('mobile-map-container');
            const btnIcon = document.querySelector('#map-toggle-btn i');
            
            // 處理圖示切換
            if (document.body.classList.contains('mobile-map-active')) {
                btnIcon.classList.remove('fa-map-location-dot');
                btnIcon.classList.add('fa-list-ul'); // 變成列表圖示
                
                // 強制重繪地圖，解決空白問題
                setTimeout(() => {
                    if(map) {
                        map.invalidateSize();
                        // 飛到當前 Day 的位置
                        const activeDayBtn = document.querySelector('.tab-btn.text-indigo-600');
                        if(activeDayBtn) {
                            const dayId = activeDayBtn.id.replace('tab-', '');
                            if(tripData[dayId]) map.flyTo(tripData[dayId].center, tripData[dayId].zoom);
                        }
                    }
                }, 100);
            } else {
                btnIcon.classList.remove('fa-list-ul');
                btnIcon.classList.add('fa-map-location-dot'); // 變回地圖圖示
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            switchDay(1);
        });
    </script>
</body>
</html>
