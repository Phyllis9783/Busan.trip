<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>釜山溫德姆奢華舒壓之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        #map { height: 100%; width: 100%; z-index: 1; background: #e5e7eb; }
        .img-container { overflow: hidden; background-color: #f3f4f6; }
        .img-container img { transition: transform 0.6s ease; }
        .group:hover .img-container img { transform: scale(1.1); }
        
        /* Mobile Map Fix */
        .mobile-map-active #mobile-map-container { display: block !important; position: absolute; inset: 0; z-index: 40; }
        .mobile-map-active #itinerary-panel { display: none; }
        
        .nav-active { color: #4f46e5; }
        .modal-bg { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 h-[100dvh] flex flex-col overflow-hidden text-slate-800">

    <header id="main-header" class="bg-white shadow-sm z-30 flex-none relative">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between mb-2">
                <div>
                    <h1 class="text-lg md:text-xl font-bold text-slate-900 truncate">釜山奢華之旅 <span class="text-[10px] bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded ml-1 align-middle">Phyllis</span></h1>
                    <p class="text-xs text-slate-500 mt-1"><i class="fa-solid fa-hotel text-indigo-600 mr-1"></i> 松島 Wyndham Grand</p>
                </div>
            </div>
        </div>
        <div class="border-t border-gray-200">
            <div class="max-w-7xl mx-auto px-4">
                <nav class="flex space-x-3 overflow-x-auto pb-1" aria-label="Tabs">
                    <button onclick="switchDay(1)" id="tab-1" class="tab-btn whitespace-nowrap py-3 px-1 border-b-2 border-indigo-500 font-medium text-sm text-indigo-600 transition-colors">Day 1</button>
                    <button onclick="switchDay(2)" id="tab-2" class="tab-btn whitespace-nowrap py-3 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 transition-colors">Day 2</button>
                    <button onclick="switchDay(3)" id="tab-3" class="tab-btn whitespace-nowrap py-3 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 transition-colors">Day 3</button>
                    <button onclick="switchDay(4)" id="tab-4" class="tab-btn whitespace-nowrap py-3 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 transition-colors">Day 4</button>
                    <button onclick="switchDay(5)" id="tab-5" class="tab-btn whitespace-nowrap py-3 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 transition-colors">Day 5</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative w-full mb-16">
        
        <div id="view-itinerary" class="flex w-full h-full">
            <div id="itinerary-panel" class="w-full md:w-[480px] lg:w-[550px] overflow-y-auto bg-slate-50 p-4 pb-24 z-10 shadow-xl flex-none scroll-smooth">
                <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 mb-6 rounded-r-lg shadow-sm">
                    <p class="text-sm text-indigo-900 font-medium leading-relaxed" id="day-summary">載入中...</p>
                </div>
                <div id="itinerary-content" class="space-y-4"></div>
                <div class="h-12"></div>
            </div>
            
            <div id="mobile-map-container" class="hidden md:block flex-1 relative bg-gray-200">
                <div id="map"></div>
            </div>
            
            <button onclick="toggleMobileMap()" id="map-toggle-btn" class="md:hidden absolute bottom-6 right-6 bg-indigo-600 text-white w-14 h-14 rounded-full shadow-2xl z-20 flex items-center justify-center hover:bg-indigo-700 transition active:scale-95">
                <i class="fa-solid fa-map-location-dot text-xl"></i>
            </button>
        </div>

        <div id="view-budget" class="hidden w-full h-full overflow-y-auto bg-slate-50 p-4 pb-24 scroll-smooth">
            <div class="bg-indigo-600 rounded-3xl p-6 text-white shadow-lg relative overflow-hidden mb-6">
                <div class="absolute -right-6 -top-6 w-32 h-32 bg-indigo-500 rounded-full opacity-50 blur-2xl"></div>
                <div class="relative z-10">
                    <p class="text-indigo-100 text-xs font-bold uppercase tracking-wider mb-1">目前累積花費 (Total Spent)</p>
                    <h2 class="text-4xl font-black tracking-tight">NT$ <span id="dash-spent-total">0</span></h2>
                    <div class="mt-4 border-t border-indigo-500/30 pt-3 flex justify-between items-center">
                        <p class="text-[10px] text-indigo-200 uppercase">今日匯率參考</p>
                        <p class="text-xs font-medium opacity-80">1 KRW ≈ 0.024 TWD</p>
                    </div>
                </div>
            </div>

            <button onclick="openExpenseModal()" class="w-full bg-white border-2 border-dashed border-indigo-200 text-indigo-600 font-bold py-4 rounded-xl mb-6 hover:bg-indigo-50 transition active:scale-[0.98]">
                <i class="fa-solid fa-plus-circle mr-2"></i> 新增一筆消費
            </button>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6 min-h-[250px]">
                <h3 class="font-bold text-slate-800 mb-4 text-sm border-l-4 border-indigo-500 pl-2">消費分佈 (TWD)</h3>
                <div class="h-48 w-full flex justify-center relative">
                    <canvas id="budgetChart"></canvas>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-3 px-1">
                    <h3 class="font-bold text-slate-800 text-sm">支出紀錄</h3>
                    <button onclick="clearExpenses()" class="text-xs text-red-400"><i class="fa-solid fa-trash-can mr-1"></i> 重置</button>
                </div>
                <div id="expense-list" class="space-y-3 pb-12"></div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-200 h-16 flex justify-around items-center text-[10px] font-bold text-slate-400 z-50 pb-safe-bottom shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button onclick="switchMainView('itinerary')" id="nav-itinerary" class="nav-item nav-active w-full h-full flex flex-col items-center justify-center gap-1">
            <i class="fa-solid fa-list-check text-xl mb-0.5"></i> 行程
        </button>
        <button onclick="switchMainView('budget')" id="nav-budget" class="nav-item w-full h-full flex flex-col items-center justify-center gap-1">
            <i class="fa-solid fa-wallet text-xl mb-0.5"></i> 財務
        </button>
    </nav>

    <div id="modal-expense" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 modal-bg transition-opacity" onclick="closeExpenseModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl p-6 shadow-2xl transform transition-transform duration-300 translate-y-full" id="modal-panel">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h3 class="text-center font-bold text-lg text-slate-800 mb-2">新增消費 (韓元)</h3>
            <p class="text-center text-xs text-slate-400 mb-6">系統將自動換算為台幣</p>
            <form onsubmit="addExpense(event)" class="space-y-5">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xl">₩</span>
                    <input type="number" id="input-cost" inputmode="numeric" required placeholder="0" class="w-full bg-slate-50 border-none rounded-2xl py-4 pl-10 pr-4 text-center text-3xl font-bold text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="text-center text-sm font-bold text-emerald-600">≈ NT$ <span id="preview-twd">0</span></div>
                <input type="text" id="input-name" required placeholder="項目名稱 (如: 午餐)" class="w-full bg-white border border-slate-200 rounded-xl py-3 px-4 text-base outline-none">
                <div class="grid grid-cols-3 gap-3">
                    <button type="button" onclick="setCat('food', this)" class="cat-btn bg-indigo-50 border-indigo-500 border ring-2 ring-indigo-200 p-3 rounded-xl flex flex-col items-center gap-1"><i class="fa-solid fa-utensils text-orange-500"></i><span class="text-xs">美食</span></button>
                    <button type="button" onclick="setCat('transport', this)" class="cat-btn p-3 rounded-xl border border-slate-100 flex flex-col items-center gap-1"><i class="fa-solid fa-taxi text-blue-500"></i><span class="text-xs">交通</span></button>
                    <button type="button" onclick="setCat('shopping', this)" class="cat-btn p-3 rounded-xl border border-slate-100 flex flex-col items-center gap-1"><i class="fa-solid fa-bag-shopping text-pink-500"></i><span class="text-xs">購物</span></button>
                    <button type="button" onclick="setCat('ticket', this)" class="cat-btn p-3 rounded-xl border border-slate-100 flex flex-col items-center gap-1"><i class="fa-solid fa-ticket text-purple-500"></i><span class="text-xs">門票</span></button>
                    <button type="button" onclick="setCat('stay', this)" class="cat-btn p-3 rounded-xl border border-slate-100 flex flex-col items-center gap-1"><i class="fa-solid fa-bed text-indigo-500"></i><span class="text-xs">住宿</span></button>
                    <button type="button" onclick="setCat('other', this)" class="cat-btn p-3 rounded-xl border border-slate-100 flex flex-col items-center gap-1"><i class="fa-solid fa-ellipsis text-gray-500"></i><span class="text-xs">其他</span></button>
                </div>
                <input type="hidden" id="input-cat" value="food">
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl text-lg shadow-lg active:scale-[0.98] transition">儲存</button>
            </form>
            <div class="h-6"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const FALLBACK_IMAGE = "https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=800&q=80";
        const EXCHANGE_RATE = 0.024;
        function krwToTwd(krw) { return Math.round(krw * EXCHANGE_RATE); }

        const tripData = {
            1: { summary: "抵達釜山，直奔松島溫德姆。", center: [35.1000, 128.9800], zoom: 11, items: [
                { time: "16:00", title: "金海機場", desc: "換匯與領行李。", type: "transport", image: "https://images.unsplash.com/photo-1530521954074-e64f6810b32d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
                { time: "17:00", title: "Taxi ➔ 飯店", desc: "舒適接送。", price: "₩25,000", type: "car", icon: "fa-car" },
                { time: "晚餐", title: "The Bridge", desc: "飯店海鮮自助。", price: "₩110,000", type: "food", image: "https://images.unsplash.com/photo-1529312266912-b33cf6227e2f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" }
            ]},
            2: { summary: "松島海景與南浦洞逛街。", center: [35.0850, 129.0250], zoom: 13, items: [
                { time: "10:00", title: "松島纜車", desc: "水晶車廂。", price: "₩22,000", type: "sight", image: "https://images.unsplash.com/photo-1595246140625-573b715e56d8?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
                { time: "12:30", title: "Taxi ➔ 南浦", desc: "短程移動。", price: "₩7,000", type: "car", icon: "fa-taxi" },
                { time: "午餐", title: "札嘎其烤魚", desc: "在地海鮮。", price: "₩35,000", type: "food", image: "https://images.unsplash.com/photo-1627993389028-2f87a82f349c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" }
            ]},
            3: { summary: "甘川洞文化村與太宗臺。", center: [35.0900, 129.0300], zoom: 13, items: [
                { time: "移動", title: "Taxi ➔ 甘川洞", desc: "直達入口。", price: "₩6,500", type: "car", icon: "fa-taxi" },
                { time: "10:00", title: "甘川文化村", desc: "小王子。", type: "sight", image: "https://images.unsplash.com/photo-1548115184-bc6544d06a58?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
                { time: "晚餐", title: "錦繡河豚湯", desc: "米其林推薦。", price: "₩30,000", type: "food", icon: "fa-utensils" }
            ]},
            4: { summary: "海雲臺膠囊列車。", center: [35.1500, 129.1300], zoom: 12, items: [
                { time: "移動", title: "Taxi ➔ 海雲臺", desc: "長途舒適。", price: "₩28,000", type: "car", icon: "fa-taxi" },
                { time: "11:00", title: "天空膠囊列車", desc: "需預約。", price: "₩35,000", type: "sight", image: "https://images.unsplash.com/photo-1685933069352-094115e58864?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
                { time: "午餐", title: "海木鰻魚飯", desc: "必吃排隊店。", price: "₩39,000", type: "food", image: "https://images.unsplash.com/photo-1580442151529-343f2f6e0e27?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" }
            ]},
            5: { summary: "最後的奢華與賦歸。", center: [35.0760, 129.0170], zoom: 14, items: [
                { time: "12:00", title: "松島公園", desc: "烤牛排骨。", price: "₩45,000", type: "food", image: "https://images.unsplash.com/photo-1606787366850-de6330128bfc?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
                { time: "16:30", title: "Taxi ➔ 機場", desc: "前往機場。", price: "₩25,000", type: "transport", image: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" }
            ]}
        };

        let map;
        let expenses = [];
        try { expenses = JSON.parse(localStorage.getItem('busan_v12_final')) || []; } catch(e) { console.warn("Storage issue"); }
        let budgetChart = null;
        let currentDay = 1;

        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            switchDay(1);
            // V12: 移除初始 initChart，改為切換時延遲載入，解決手機隱藏元素無法渲染問題
            renderExpenses();
            updateBudgetUI();
            
            document.getElementById('input-cost').addEventListener('input', function(e) {
                const val = parseInt(e.target.value) || 0;
                document.getElementById('preview-twd').innerText = krwToTwd(val).toLocaleString();
            });
        });

        // 核心導航切換
        function switchMainView(view) {
            // 關閉地圖
            document.body.classList.remove('mobile-map-active');
            const btnIcon = document.querySelector('#map-toggle-btn i');
            if(btnIcon) {
                btnIcon.classList.remove('fa-list-ul');
                btnIcon.classList.add('fa-map-location-dot');
            }

            const views = ['itinerary', 'budget'];
            const header = document.getElementById('main-header');
            
            views.forEach(v => {
                const el = document.getElementById(`view-${v}`);
                const nav = document.getElementById(`nav-${v}`);
                if (v === view) {
                    el.classList.remove('hidden');
                    nav.classList.add('nav-active', 'text-indigo-600');
                    nav.classList.remove('text-slate-400');
                } else {
                    el.classList.add('hidden');
                    nav.classList.remove('nav-active', 'text-indigo-600');
                    nav.classList.add('text-slate-400');
                }
            });

            if (view === 'itinerary') {
                header.classList.remove('hidden');
                if (map) setTimeout(() => map.invalidateSize(), 100);
            } else {
                header.classList.add('hidden');
                // V12: 切換到財務頁時才繪製圖表，解決手機空白問題
                setTimeout(() => {
                    initChart();
                    updateChartData();
                }, 100);
            }
        }

        function parsePrice(priceStr) {
            if(!priceStr) return 0;
            return parseInt(priceStr.replace(/[^0-9]/g, '')) || 0;
        }

        function initMap() {
            try {
                map = L.map('map', { zoomControl: false }).setView([35.1000, 129.0300], 12);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '', maxZoom: 19 }).addTo(map);
            } catch (e) { console.log("Map Error"); }
        }

        function switchDay(day) {
            currentDay = day;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-indigo-500', 'text-indigo-600');
                btn.classList.add('border-transparent', 'text-gray-500');
            });
            document.getElementById(`tab-${day}`).classList.replace('border-transparent', 'border-indigo-500');
            document.getElementById(`tab-${day}`).classList.replace('text-gray-500', 'text-indigo-600');
            document.getElementById('day-summary').textContent = tripData[day].summary;

            const container = document.getElementById('itinerary-content');
            container.innerHTML = ''; 

            tripData[day].items.forEach((item) => {
                let priceHtml = '';
                if (item.price) {
                    const kVal = parsePrice(item.price);
                    const tVal = krwToTwd(kVal);
                    priceHtml = `
                        <div class="mt-2 flex items-baseline gap-2">
                            <span class="text-indigo-600 font-bold text-sm">${item.price}</span>
                            <span class="text-xs text-slate-400">≈ NT$${tVal}</span>
                        </div>`;
                }

                let cardHtml = '';
                if (item.type === 'car' || (item.type === 'transport' && !item.image) || (item.type === 'food' && !item.image)) {
                    cardHtml = `
                        <div class="bg-white rounded-xl p-4 shadow-md flex items-start gap-3 fade-in border-l-4 border-slate-600">
                            <div class="flex-shrink-0 mt-1"><i class="fa-solid ${item.icon || 'fa-car'} text-lg text-slate-600"></i></div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-bold text-base text-slate-800">${item.title}</h3>
                                </div>
                                <p class="text-gray-600 text-sm mt-1">${item.desc}</p>
                                ${priceHtml}
                            </div>
                        </div>`;
                } else {
                    cardHtml = `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden fade-in border border-gray-100 flex h-32 md:h-auto group">
                            <div class="w-32 md:w-32 h-full relative flex-shrink-0 img-container">
                                <img src="${item.image || FALLBACK_IMAGE}" class="absolute inset-0 w-full h-full object-cover" onerror="this.src='${FALLBACK_IMAGE}'">
                            </div>
                            <div class="p-3 flex-1 flex flex-col justify-center min-w-0">
                                <div class="text-xs font-bold text-gray-400 mb-1">${item.time}</div>
                                <h3 class="font-bold text-base text-slate-800 mb-1 truncate">${item.title}</h3>
                                <p class="text-gray-600 text-xs md:text-sm line-clamp-2">${item.desc}</p>
                                ${priceHtml}
                            </div>
                        </div>`;
                }
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
            
            if (map && tripData[day].center) {
                map.flyTo(tripData[day].center, tripData[day].zoom, { animate: true, duration: 1.5 });
            }
        }

        function toggleMobileMap() {
            document.body.classList.toggle('mobile-map-active');
            const btnIcon = document.querySelector('#map-toggle-btn i');
            if (document.body.classList.contains('mobile-map-active')) {
                btnIcon.classList.replace('fa-map-location-dot', 'fa-list-ul');
                setTimeout(() => {
                    map.invalidateSize();
                    if(tripData[currentDay]) map.flyTo(tripData[currentDay].center, tripData[currentDay].zoom);
                }, 100);
            } else {
                btnIcon.classList.replace('fa-list-ul', 'fa-map-location-dot');
            }
        }

        // V12: 優化的圖表初始化邏輯
        function initChart() {
            const ctx = document.getElementById('budgetChart');
            if (!ctx) return;
            if (budgetChart) return; // 避免重複建立

            budgetChart = new Chart(ctx.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['美食', '交通', '購物', '門票', '住宿', '其他'],
                    datasets: [{ data: [0,0,0,0,0,0], backgroundColor: ['#f97316', '#3b82f6', '#ec4899', '#a855f7', '#6366f1', '#94a3b8'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10 } } } }
            });
        }

        function updateChartData() {
            if (!budgetChart) return;
            const cats = { food:0, transport:0, shopping:0, ticket:0, stay:0, other:0 };
            expenses.forEach(e => { if(cats[e.cat] !== undefined) cats[e.cat] += e.costTWD; else cats.other += e.costTWD; });
            budgetChart.data.datasets[0].data = Object.values(cats);
            budgetChart.update();
        }

        function openExpenseModal() { document.getElementById('modal-expense').classList.remove('hidden'); setTimeout(() => document.getElementById('modal-panel').classList.remove('translate-y-full'), 10); }
        function closeExpenseModal() { document.getElementById('modal-panel').classList.add('translate-y-full'); setTimeout(() => document.getElementById('modal-expense').classList.add('hidden'), 300); }
        function setCat(cat, btn) {
            document.getElementById('input-cat').value = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('bg-indigo-50', 'border-indigo-500', 'ring-2', 'ring-indigo-200'));
            btn.classList.add('bg-indigo-50', 'border-indigo-500', 'ring-2', 'ring-indigo-200');
        }

        function addExpense(e) {
            e.preventDefault();
            const costKRW = parseInt(document.getElementById('input-cost').value);
            const name = document.getElementById('input-name').value;
            const cat = document.getElementById('input-cat').value;
            
            if (costKRW && name) {
                const costTWD = krwToTwd(costKRW);
                expenses.push({ id: Date.now(), name, costKRW, costTWD, cat });
                try { localStorage.setItem('busan_v12_final', JSON.stringify(expenses)); } catch(e){}
                
                renderExpenses();
                updateBudgetUI();
                
                // V12 關鍵修正：UI 流程
                closeExpenseModal();
                document.activeElement.blur(); // 強制收起鍵盤
                document.getElementById('input-cost').value = '';
                document.getElementById('input-name').value = '';
                document.getElementById('preview-twd').innerText = '0';
                
                // 強制跳轉回財務列表頁面並更新
                switchMainView('budget');
            }
        }

        function renderExpenses() {
            const list = document.getElementById('expense-list');
            list.innerHTML = '';
            if (expenses.length === 0) { list.innerHTML = '<div class="text-center py-8 text-slate-400 text-xs">尚無消費紀錄</div>'; return; }
            expenses.slice().reverse().forEach(ex => {
                const row = `
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100 shadow-sm fade-in">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 text-xs">${getIcon(ex.cat)}</div>
                            <div>
                                <p class="font-bold text-slate-800 text-sm">${ex.name}</p>
                                <p class="text-[10px] text-slate-400">₩${ex.costKRW.toLocaleString()}</p>
                            </div>
                        </div>
                        <div class="font-bold text-indigo-600 text-sm">NT$${ex.costTWD.toLocaleString()}</div>
                    </div>`;
                list.insertAdjacentHTML('beforeend', row);
            });
        }

        function updateBudgetUI() {
            const spentTWD = expenses.reduce((acc, curr) => acc + curr.costTWD, 0);
            document.getElementById('dash-spent-total').innerText = spentTWD.toLocaleString();
            updateChartData(); // 確保數字與圖表同步
        }

        function clearExpenses() { 
            if(confirm('確定清除所有紀錄？')) { 
                expenses = []; 
                try { localStorage.setItem('busan_v12_final', JSON.stringify(expenses)); } catch(e){}
                renderExpenses(); updateBudgetUI(); 
            } 
        }
        function getIcon(cat) { const map = { food: '<i class="fa-solid fa-utensils"></i>', transport: '<i class="fa-solid fa-taxi"></i>', shopping: '<i class="fa-solid fa-bag-shopping"></i>', ticket: '<i class="fa-solid fa-ticket"></i>', stay: '<i class="fa-solid fa-bed"></i>', other: '<i class="fa-solid fa-circle"></i>' }; return map[cat] || map.other; }
    </script>
</body>
</html>
