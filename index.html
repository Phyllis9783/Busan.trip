<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phyllis 釜山奢華策展 V15</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 隱藏滾動條但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 動畫效果 */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* Leaflet 地圖樣式 */
        #map { height: 100%; width: 100%; z-index: 1; background: #e5e7eb; }
        .marker-pin {
            width: 30px; height: 30px; border-radius: 50% 50% 50% 0;
            background: #4f46e5; position: absolute; transform: rotate(-45deg);
            left: 50%; top: 50%; margin: -15px 0 0 -15px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }
        .marker-pin::after {
            content: ''; width: 14px; height: 14px; margin: 8px 0 0 8px;
            background: #fff; position: absolute; border-radius: 50%;
        }

        /* IOS Input 優化 */
        input, select, textarea { font-size: 16px; } 
        
        /* 導航按鈕優化 */
        .nav-btn-pulse {
            animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col text-slate-800 overflow-hidden">

    <header class="bg-white/95 backdrop-blur-md shadow-sm z-30 flex-none border-b border-gray-200">
        <div class="px-4 py-3">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Busan Escape <span class="text-indigo-600 text-sm align-top">V15</span></h1>
                    <p class="text-xs text-slate-500 font-medium">1/5 - 1/9 奢華舒壓行 • 圖片修復版</p>
                </div>
                <div class="text-right">
                    <div class="text-xs text-gray-400">總支出 (TWD)</div>
                    <div id="header-total" class="text-lg font-bold text-indigo-600 font-mono">0</div>
                </div>
            </div>
        </div>
        
        <div class="flex border-t border-gray-100">
            <button onclick="switchMainTab('itinerary')" id="btn-itinerary" class="flex-1 py-3 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600 transition-colors bg-indigo-50/50">
                <i class="fa-solid fa-map-location-dot mr-1"></i> 行程動線
            </button>
            <button onclick="switchMainTab('finance')" id="btn-finance" class="flex-1 py-3 text-sm font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition-colors">
                <i class="fa-solid fa-chart-pie mr-1"></i> 財務管家
            </button>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden">
        
        <div id="tab-itinerary" class="h-full flex flex-col md:flex-row absolute inset-0 transition-transform duration-300">
            
            <div class="w-full md:w-[450px] flex flex-col bg-gray-50 z-20 shadow-xl md:border-r border-gray-200 h-[60%] md:h-full">
                <div class="flex space-x-4 overflow-x-auto no-scrollbar p-3 bg-white border-b border-gray-200 shadow-sm flex-none">
                    <button onclick="updateDay(1)" class="day-btn active-day flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold bg-indigo-600 text-white transition-all" data-day="1">D1 抵達</button>
                    <button onclick="updateDay(2)" class="day-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-day="2">D2 松島</button>
                    <button onclick="updateDay(3)" class="day-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-day="3">D3 文化</button>
                    <button onclick="updateDay(4)" class="day-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-day="4">D4 膠囊</button>
                    <button onclick="updateDay(5)" class="day-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-day="5">D5 賦歸</button>
                </div>

                <div class="bg-indigo-50 px-4 py-3 border-b border-indigo-100 flex-none">
                    <p id="day-summary" class="text-xs text-indigo-800 font-medium leading-relaxed">
                        抵達釜山，專車接送至飯店，享受舒適的開始。
                    </p>
                </div>

                <div id="itinerary-list" class="flex-1 overflow-y-auto p-4 space-y-4 pb-20">
                    </div>
            </div>

            <div class="flex-1 relative h-[40%] md:h-full bg-slate-100">
                <div id="map"></div>
                <button onclick="openNaverMap()" class="nav-btn-pulse absolute bottom-6 right-4 bg-white/95 backdrop-blur px-4 py-3 rounded-full shadow-xl text-sm font-bold text-slate-700 z-[400] border border-gray-200 flex items-center gap-2 hover:bg-indigo-50 active:scale-95 transition-transform cursor-pointer">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Naver_Logo.svg/1200px-Naver_Logo.svg.png" class="w-4 h-4 object-contain">
                    <span class="text-indigo-600">Naver Map</span>
                    <i class="fa-solid fa-location-arrow text-gray-400 text-xs"></i>
                </button>
            </div>
        </div>

        <div id="tab-finance" class="h-full w-full absolute inset-0 translate-x-full transition-transform duration-300 bg-gray-50 overflow-y-auto pb-20">
            <div class="max-w-md mx-auto p-4 space-y-6">
                
                <div class="bg-white rounded-2xl shadow-lg p-5 border border-indigo-50">
                    <h3 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">快速記帳 (KRW)</h3>
                    <div class="flex gap-2 mb-3">
                        <input type="number" id="expense-amount" placeholder="輸入韓元金額" class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-lg font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" onkeydown="if(event.key==='Enter') this.blur()">
                    </div>
                    <div class="grid grid-cols-4 gap-2 mb-3">
                        <button onclick="setExpenseType('food')" class="type-btn active p-2 rounded-lg border border-orange-200 bg-orange-50 text-orange-600 text-xs font-bold flex flex-col items-center gap-1" data-type="food"><i class="fa-solid fa-utensils"></i> 餐飲</button>
                        <button onclick="setExpenseType('transport')" class="type-btn p-2 rounded-lg border border-slate-200 text-slate-500 text-xs font-bold flex flex-col items-center gap-1" data-type="transport"><i class="fa-solid fa-taxi"></i> 交通</button>
                        <button onclick="setExpenseType('shopping')" class="type-btn p-2 rounded-lg border border-slate-200 text-slate-500 text-xs font-bold flex flex-col items-center gap-1" data-type="shopping"><i class="fa-solid fa-bag-shopping"></i> 購物</button>
                        <button onclick="setExpenseType('other')" class="type-btn p-2 rounded-lg border border-slate-200 text-slate-500 text-xs font-bold flex flex-col items-center gap-1" data-type="other"><i class="fa-solid fa-ticket"></i> 其他</button>
                    </div>
                    <button onclick="addExpense()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md transition-transform active:scale-95 flex items-center justify-center">
                        <i class="fa-solid fa-plus mr-2"></i> 記錄這筆消費
                    </button>
                </div>

                <div class="bg-white rounded-2xl shadow p-5">
                    <h3 class="text-sm font-bold text-gray-500 mb-4 uppercase">消費分佈</h3>
                    <div class="relative w-48 h-48 mx-auto">
                        <canvas id="budgetChart"></canvas>
                        <div class="absolute inset-0 flex items-center justify-center flex-col pointer-events-none">
                            <span class="text-xs text-gray-400">總計 (TWD)</span>
                            <span id="chart-total" class="text-lg font-bold text-slate-700">0</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow overflow-hidden">
                    <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="text-sm font-bold text-gray-500">最近紀錄</h3>
                        <button onclick="clearExpenses()" class="text-xs text-red-400 hover:text-red-600">清空</button>
                    </div>
                    <div id="expense-list" class="divide-y divide-gray-100 max-h-60 overflow-y-auto">
                        </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 設定與資料 ---
        const EXCHANGE_RATE = 0.022; 
        let map;
        let activeMarker = null;
        let budgetChart = null;
        let currentType = 'food';
        let currentDayCenter = [35.0788, 129.0180]; 

        // 圖片載入失敗的替代圖 (Fail-safe)
        const FALLBACK_IMAGE = "https://placehold.co/600x400/e2e8f0/64748b?text=Image+Not+Available";

        // 行程資料庫 (更新為高穩定性的 Unsplash 連結)
        const tripData = {
            1: {
                summary: "Day 1: 專車直達飯店，享受海鮮自助餐，保留體力。",
                center: [35.0788, 129.0180], 
                zoom: 14,
                items: [
                    { time: "16:00", title: "金海機場 (PUS)", desc: "領行李、換匯。直接搭計程車。", price: "預估 ₩25,000", type: "transport", icon: "fa-plane" },
                    // Wyndham 飯店：使用高品質飯店窗景圖
                    { time: "17:30", title: "Wyndham Grand", desc: "Check-in，全客房海景放鬆。", type: "hotel", image: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
                    { time: "19:00", title: "The Bridge", desc: "飯店豪華海鮮自助餐，不用出門。", price: "₩110,000", type: "food", icon: "fa-utensils" }
                ]
            },
            2: {
                summary: "Day 2: 上午松島高空纜車，下午南浦洞逛街。",
                center: [35.0850, 129.0250],
                zoom: 13,
                items: [
                    // 松島纜車：使用清晰的海上纜車圖
                    { time: "10:30", title: "松島海上纜車", desc: "步行即達。推薦搭乘水晶車廂。", price: "₩22,000", type: "sight", image: "https://images.unsplash.com/photo-1534234828569-16d22b0f4496?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
                    { time: "12:00", title: "EL16.52 Cafe", desc: "絕美海景咖啡廳，稍作休息。", price: "₩10,000", type: "food", icon: "fa-mug-hot" },
                    { time: "13:30", title: "移動至南浦洞", desc: "計程車前往，省時省力。", price: "約 ₩8,000", type: "transport", icon: "fa-taxi" },
                    // 札嘎其市場：使用市場海鮮氛圍圖
                    { time: "14:00", title: "札嘎其市場", desc: "體驗釜山海鮮文化。", price: "₩30,000", type: "food", image: "https://images.unsplash.com/photo-1534483509719-3feaee7c30da?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" }
                ]
            },
            3: {
                summary: "Day 3: 山城文化巡禮。策略：計程車直達高點。",
                center: [35.0975, 129.0106],
                zoom: 13,
                items: [
                    // 甘川洞：使用經典彩色房屋圖
                    { time: "10:00", title: "甘川洞文化村", desc: "計程車直達入口。尋找小王子。", price: "車資 ₩7,000", type: "sight", image: "https://images.unsplash.com/photo-1596417770176-d39b03ae2803?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
                    // 白淺灘：使用白色濱海建築圖 (Santorini vibe)
                    { time: "14:00", title: "白淺灘文化村", desc: "絕壁上的白色村莊，很多好拍的咖啡廳。", type: "sight", image: "https://images.unsplash.com/photo-1598448777977-1c5c56d77327?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
                    { time: "18:00", title: "返回飯店", desc: "晚餐於松島附近享用。", type: "hotel", icon: "fa-bed" }
                ]
            },
            4: {
                summary: "Day 4: 天空膠囊列車 (已預訂)。長途移動日。",
                center: [35.1600, 129.1678],
                zoom: 12,
                items: [
                    { time: "14:00", title: "前往尾浦站", desc: "長途計程車 (約45分)，舒適移動。", price: "約 ₩25,000", type: "transport", icon: "fa-taxi" },
                    // 天空膠囊：使用濱海鐵道圖 (最接近膠囊列車氛圍的圖)
                    { time: "15:30", title: "天空膠囊列車", desc: "預約時段 (尾浦出發)。私人車廂。", price: "已預付 NT$849", type: "sight", image: "https://images.unsplash.com/photo-1544473343-29c8e8d89311?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
                    // 鰻魚飯：使用日式/韓式魚料理圖
                    { time: "17:00", title: "海木 (Haemok)", desc: "米其林推薦鰻魚飯。", price: "₩38,000", type: "food", image: "https://images.unsplash.com/photo-1553621042-f6e147245754?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" }
                ]
            },
            5: {
                summary: "Day 5: 睡飽退房，最後的韓式烤肉午餐。",
                center: [35.0760, 129.0170],
                zoom: 14,
                items: [
                    { time: "11:00", title: "退房 & 寄放行李", desc: "享受最後的海景。", type: "hotel", icon: "fa-suitcase" },
                    // 松島公園烤肉：使用高品質燒肉圖
                    { time: "12:30", title: "松島公園", desc: "頂級牛排骨午間套餐。", price: "₩35,000", type: "food", image: "https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
                    { time: "16:30", title: "前往機場", desc: "搭乘計程車。", price: "預估 ₩25,000", type: "transport", icon: "fa-plane" }
                ]
            }
        };

        // --- 邏輯功能 ---
        
        function init() {
            map = L.map('map', { zoomControl: false }).setView(tripData[1].center, tripData[1].zoom);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: 'OpenStreetMap'
            }).addTo(map);

            updateDay(1);
            renderExpenses();
            updateChart();
        }

        function openNaverMap() {
            if (!currentDayCenter) return;
            const lat = currentDayCenter[0];
            const lng = currentDayCenter[1];
            const naverUrl = `https://map.naver.com/v5/?c=${lng},${lat},15,0,0,0,dh`;
            window.open(naverUrl, '_blank');
        }

        function updateDay(day) {
            currentDayCenter = tripData[day].center;

            document.querySelectorAll('.day-btn').forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
                b.classList.add('text-gray-600', 'hover:bg-gray-100');
            });
            const activeBtn = document.querySelector(`.day-btn[data-day="${day}"]`);
            activeBtn.classList.remove('text-gray-600', 'hover:bg-gray-100');
            activeBtn.classList.add('bg-indigo-600', 'text-white', 'shadow-md');

            document.getElementById('day-summary').innerText = tripData[day].summary;

            map.flyTo(tripData[day].center, tripData[day].zoom, { duration: 1.5 });
            
            if(activeMarker) map.removeLayer(activeMarker);
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div class='marker-pin'></div>",
                iconSize: [30, 42], iconAnchor: [15, 42]
            });
            activeMarker = L.marker(tripData[day].center, {icon: icon}).addTo(map);

            const list = document.getElementById('itinerary-list');
            list.innerHTML = '';
            tripData[day].items.forEach((item, idx) => {
                const isImageCard = !!item.image;
                const html = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden fade-in flex ${isImageCard ? 'flex-col sm:flex-row' : 'flex-row items-center'} gap-3 p-3" style="animation-delay: ${idx * 0.1}s">
                        ${isImageCard ? `<div class="h-32 sm:w-28 sm:h-auto bg-gray-200 flex-shrink-0 relative">
                            <img src="${item.image}" class="absolute inset-0 w-full h-full object-cover" onerror="this.src='${FALLBACK_IMAGE}'; this.onerror=null;">
                        </div>` : 
                        `<div class="w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center flex-shrink-0 text-indigo-500"><i class="fa-solid ${item.icon}"></i></div>`}
                        
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start">
                                <span class="text-xs font-bold text-indigo-500">${item.time}</span>
                                ${item.price ? `<span class="text-xs font-bold bg-gray-100 px-2 py-0.5 rounded text-gray-600">${item.price}</span>` : ''}
                            </div>
                            <h3 class="font-bold text-gray-800 truncate">${item.title}</h3>
                            <p class="text-xs text-gray-500 line-clamp-2 mt-1">${item.desc}</p>
                        </div>
                    </div>
                `;
                list.insertAdjacentHTML('beforeend', html);
            });
        }

        function switchMainTab(tab) {
            const itineraryEl = document.getElementById('tab-itinerary');
            const financeEl = document.getElementById('tab-finance');
            const btnItinerary = document.getElementById('btn-itinerary');
            const btnFinance = document.getElementById('btn-finance');

            if (tab === 'itinerary') {
                itineraryEl.classList.remove('-translate-x-full');
                financeEl.classList.add('translate-x-full');
                financeEl.classList.remove('inset-0'); 
                
                btnItinerary.classList.add('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
                btnItinerary.classList.remove('text-gray-500', 'border-transparent');
                btnFinance.classList.remove('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
                btnFinance.classList.add('text-gray-500', 'border-transparent');
                
                setTimeout(() => map.invalidateSize(), 300);
            } else {
                itineraryEl.classList.add('-translate-x-full');
                financeEl.classList.remove('translate-x-full');
                financeEl.classList.add('inset-0');

                btnFinance.classList.add('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
                btnFinance.classList.remove('text-gray-500', 'border-transparent');
                btnItinerary.classList.remove('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
                btnItinerary.classList.add('text-gray-500', 'border-transparent');
                
                updateChart(); 
            }
        }

        function setExpenseType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                if(btn.dataset.type === type) {
                    btn.classList.add('bg-indigo-50', 'border-indigo-200', 'text-indigo-600');
                    btn.classList.remove('border-slate-200', 'text-slate-500');
                } else {
                    btn.classList.remove('bg-indigo-50', 'border-indigo-200', 'text-indigo-600', 'bg-orange-50', 'text-orange-600');
                    btn.classList.add('border-slate-200', 'text-slate-500');
                }
            });
        }

        function getExpenses() {
            try {
                return JSON.parse(localStorage.getItem('busan_expenses_v15')) || [];
            } catch { return []; }
        }

        function addExpense() {
            const amountKRW = parseFloat(document.getElementById('expense-amount').value);
            if (!amountKRW) return;

            const amountTWD = Math.round(amountKRW * EXCHANGE_RATE);
            const expense = {
                id: Date.now(),
                amountKRW: amountKRW,
                amountTWD: amountTWD,
                type: currentType,
                date: new Date().toLocaleDateString()
            };

            const expenses = getExpenses();
            expenses.unshift(expense);
            localStorage.setItem('busan_expenses_v15', JSON.stringify(expenses));

            document.getElementById('expense-amount').value = '';
            renderExpenses();
            updateChart();
        }

        function clearExpenses() {
            if(confirm('確定要清空所有記帳紀錄嗎？')) {
                localStorage.removeItem('busan_expenses_v15');
                renderExpenses();
                updateChart();
            }
        }

        function renderExpenses() {
            const list = document.getElementById('expense-list');
            const expenses = getExpenses();
            let totalTWD = 0;

            list.innerHTML = expenses.map(ex => {
                totalTWD += ex.amountTWD;
                let iconClass = 'fa-circle-question';
                let colorClass = 'text-gray-500';
                
                if(ex.type === 'food') { iconClass = 'fa-utensils'; colorClass = 'text-orange-500'; }
                if(ex.type === 'transport') { iconClass = 'fa-taxi'; colorClass = 'text-blue-500'; }
                if(ex.type === 'shopping') { iconClass = 'fa-bag-shopping'; colorClass = 'text-pink-500'; }
                
                return `
                    <div class="px-4 py-3 flex justify-between items-center group">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center ${colorClass} text-sm">
                                <i class="fa-solid ${iconClass}"></i>
                            </div>
                            <div>
                                <div class="font-bold text-gray-800">₩${ex.amountKRW.toLocaleString()}</div>
                                <div class="text-xs text-gray-400">${ex.date}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-indigo-600">NT$${ex.amountTWD.toLocaleString()}</div>
                        </div>
                    </div>
                `;
            }).join('');

            const grandTotal = totalTWD + 849;
            document.getElementById('header-total').innerText = grandTotal.toLocaleString();
            document.getElementById('chart-total').innerText = "NT$" + grandTotal.toLocaleString();
        }

        function updateChart() {
            const ctx = document.getElementById('budgetChart').getContext('2d');
            const expenses = getExpenses();
            
            const dataMap = { 'food': 0, 'transport': 0, 'shopping': 0, 'other': 849 }; 
            expenses.forEach(ex => {
                if (dataMap[ex.type] !== undefined) dataMap[ex.type] += ex.amountTWD;
                else dataMap['other'] += ex.amountTWD;
            });

            const dataValues = [dataMap.food, dataMap.transport, dataMap.shopping, dataMap.other];

            if (budgetChart) budgetChart.destroy();

            budgetChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['餐飲', '交通', '購物', '其他(含預付)'],
                    datasets: [{
                        data: dataValues,
                        backgroundColor: ['#f97316', '#3b82f6', '#ec4899', '#64748b'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '75%',
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
