<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phyllis 釜山奢華策展 V38</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        #map { height: 100%; width: 100%; z-index: 1; background: #e5e7eb; }
        
        .marker-pin {
            width: 30px; height: 30px; border-radius: 50% 50% 50% 0;
            background: #4f46e5; position: absolute; transform: rotate(-45deg);
            left: 50%; top: 50%; margin: -15px 0 0 -15px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }
        .marker-pin::after {
            content: ''; width: 14px; height: 14px; margin: 8px 0 0 8px;
            background: #fff; position: absolute; border-radius: 50%;
        }

        .nav-btn-fixed {
            position: fixed; bottom: 6rem; right: 1rem; z-index: 999;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .category-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;
        }
        
        .btn-delete { opacity: 0.4; transition: all 0.2s; cursor: pointer; }
        .btn-delete:hover { opacity: 1; color: #ef4444; transform: scale(1.1); }
        
        input[type="number"] { -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col text-slate-800 overflow-hidden">

    <header class="bg-white/95 backdrop-blur-md shadow-sm z-30 flex-none border-b border-gray-200">
        <div class="px-4 py-3">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Busan Escape <span class="text-indigo-600 text-sm align-top">V38</span></h1>
                    <p class="text-xs text-slate-500 font-medium">1/5 - 1/9 奢華舒壓 • 視覺完美版</p>
                </div>
                <div class="text-right">
                    <div class="text-[10px] text-gray-400 uppercase tracking-wide">Total Estimate</div>
                    <div id="header-total" class="text-lg font-bold text-indigo-600 font-mono">0</div>
                </div>
            </div>
        </div>
        
        <div class="flex border-t border-gray-100">
            <button onclick="switchMainTab('itinerary')" id="btn-itinerary" class="flex-1 py-3 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600 transition-colors bg-indigo-50/50">
                <i class="fa-solid fa-map-location-dot mr-1"></i> 行程動線
            </button>
            <button onclick="switchMainTab('finance')" id="btn-finance" class="flex-1 py-3 text-sm font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition-colors">
                <i class="fa-solid fa-calculator mr-1"></i> 記帳管家
            </button>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden">
        
        <div id="tab-itinerary" class="h-full flex flex-col md:flex-row absolute inset-0 transition-transform duration-300">
            
            <div class="w-full md:w-[450px] flex flex-col bg-gray-50 z-20 shadow-xl md:border-r border-gray-200 h-[60%] md:h-full">
                <div class="flex space-x-4 overflow-x-auto no-scrollbar p-3 bg-white border-b border-gray-200 shadow-sm flex-none">
                    <button onclick="updateDay(1)" class="day-btn active-day flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold bg-indigo-600 text-white transition-all" data-day="1">D1 抵達</button>
                    <button onclick="updateDay(2)" class="day-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-day="2">D2 藝文</button>
                    <button onclick="updateDay(3)" class="day-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-day="3">D3 漫遊</button>
                    <button onclick="updateDay(4)" class="day-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-day="4">D4 奢華</button>
                    <button onclick="updateDay(5)" class="day-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all" data-day="5">D5 賦歸</button>
                </div>

                <div class="bg-indigo-50 px-4 py-3 border-b border-indigo-100 flex-none">
                    <p id="day-summary" class="text-xs text-indigo-800 font-medium leading-relaxed">
                        抵達釜山，專車接送至飯店，享受舒適的開始。
                    </p>
                </div>

                <div id="itinerary-list" class="flex-1 overflow-y-auto p-4 space-y-4 pb-20">
                    </div>
            </div>

            <div class="flex-1 relative h-[40%] md:h-full bg-slate-100">
                <div id="map"></div>
                <button onclick="openNaverMap()" class="nav-btn-fixed bg-white/95 backdrop-blur px-4 py-3 rounded-full text-sm font-bold text-slate-700 border border-gray-200 flex items-center gap-2 hover:bg-indigo-50 active:scale-95 transition-transform cursor-pointer">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Naver_Logo.svg/1200px-Naver_Logo.svg.png" class="w-4 h-4 object-contain">
                    <span class="text-indigo-600">即時導航</span>
                    <i class="fa-solid fa-location-arrow text-gray-400 text-xs ml-1"></i>
                </button>
            </div>
        </div>

        <div id="tab-finance" class="h-full w-full absolute inset-0 translate-x-full transition-transform duration-300 bg-gray-50 overflow-y-auto pb-20">
            <div class="max-w-md mx-auto p-4 space-y-6">
                
                <div class="bg-white rounded-2xl shadow-lg p-5 border border-indigo-50">
                    <div class="flex justify-between items-end mb-3">
                        <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider">快速記帳</h3>
                        <span class="text-xs text-indigo-400 bg-indigo-50 px-2 py-1 rounded">匯率: 0.022</span>
                    </div>
                    
                    <div class="flex gap-2 mb-3">
                        <div class="relative flex-1">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">₩</span>
                            <input type="number" id="expense-amount" placeholder="輸入韓元金額" class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-8 pr-4 py-3 text-lg font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" onkeydown="if(event.key==='Enter') this.blur()">
                        </div>
                    </div>
                    
                    <div class="category-grid mb-3">
                        <button onclick="setExpenseType('food')" class="type-btn active p-2 rounded-lg border border-orange-200 bg-orange-50 text-orange-600 text-xs font-bold flex flex-col items-center gap-1" data-type="food"><i class="fa-solid fa-utensils"></i> 餐飲</button>
                        <button onclick="setExpenseType('transport')" class="type-btn p-2 rounded-lg border border-slate-200 text-slate-500 text-xs font-bold flex flex-col items-center gap-1" data-type="transport"><i class="fa-solid fa-taxi"></i> 交通</button>
                        <button onclick="setExpenseType('shopping')" class="type-btn p-2 rounded-lg border border-slate-200 text-slate-500 text-xs font-bold flex flex-col items-center gap-1" data-type="shopping"><i class="fa-solid fa-bag-shopping"></i> 購物</button>
                        <button onclick="setExpenseType('hotel')" class="type-btn p-2 rounded-lg border border-slate-200 text-slate-500 text-xs font-bold flex flex-col items-center gap-1" data-type="hotel"><i class="fa-solid fa-bed"></i> 住宿</button>
                        <button onclick="setExpenseType('ticket')" class="type-btn p-2 rounded-lg border border-slate-200 text-slate-500 text-xs font-bold flex flex-col items-center gap-1" data-type="ticket"><i class="fa-solid fa-ticket"></i> 門票</button>
                        <button onclick="setExpenseType('other')" class="type-btn p-2 rounded-lg border border-slate-200 text-slate-500 text-xs font-bold flex flex-col items-center gap-1" data-type="other"><i class="fa-solid fa-ellipsis"></i> 其他</button>
                    </div>

                    <button onclick="addExpense()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md transition-transform active:scale-95 flex items-center justify-center">
                        <i class="fa-solid fa-plus mr-2"></i> 新增消費
                    </button>
                </div>

                <div class="bg-white rounded-2xl shadow p-5">
                    <h3 class="text-sm font-bold text-gray-500 mb-4 uppercase">預算分佈 (TWD)</h3>
                    <div class="relative w-48 h-48 mx-auto">
                        <canvas id="budgetChart"></canvas>
                        <div class="absolute inset-0 flex items-center justify-center flex-col pointer-events-none">
                            <span class="text-xs text-gray-400">總計</span>
                            <span id="chart-total" class="text-lg font-bold text-slate-700">0</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow overflow-hidden">
                    <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="text-sm font-bold text-gray-500">消費明細</h3>
                        <div class="flex gap-2">
                            <button onclick="resetPrepaid()" class="text-xs text-indigo-400 hover:text-indigo-600">重置預付</button>
                            <button onclick="clearUserExpenses()" class="text-xs text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can mr-1"></i>清空記帳</button>
                        </div>
                    </div>
                    <div id="expense-list" class="divide-y divide-gray-100 max-h-60 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const EXCHANGE_RATE = 0.022; 
        const FALLBACK_IMAGE = "https://placehold.co/800x600/e0e7ff/4f46e5?text=Busan+Trip";

        let map;
        let activeMarker = null;
        let budgetChart = null;
        let currentType = 'food';
        let currentDayCenter = [35.0788, 129.0180]; 

        // V38: 預付項目資料結構
        const DEFAULT_PREPAID = [
            { id: 'p1', title: "華航機票 (已付)", priceTWD: 8861, priceKRW: null, type: 'transport', note: "TWD 刷卡" },
            { id: 'p2', title: "溫德姆飯店 (現場付)", priceTWD: 14516, priceKRW: 659813, type: 'hotel', note: "現場刷卡" },
            { id: 'p3', title: "膠囊列車 (已付)", priceTWD: 849, priceKRW: null, type: 'ticket', note: "KKday" },
            { id: 'p4', title: "Arte Museum (已付)", priceTWD: 826, priceKRW: null, type: 'ticket', note: "KKday" }
        ];

        // 行程資料
        const tripData = {
            1: {
                summary: "Day 1: 專車直達飯店，海鮮自助餐犒賞自己。",
                center: [35.0788, 129.0180], 
                zoom: 14,
                items: [
                    { time: "16:00", title: "金海機場 (PUS)", desc: "領行李、換匯。", price: "預估 ₩25,000 (≈NT$550)", type: "transport", icon: "fa-plane" },
                    { time: "17:30", title: "Wyndham Grand", desc: "Check-in，全客房海景。", type: "hotel", image: "https://picsum.photos/seed/busan_hotel_view/800/600" },
                    { time: "19:00", title: "The Bridge 自助餐", desc: "飯店4F，頂級海鮮吃到飽。", price: "₩110,000 (≈NT$2,420)", type: "food", icon: "fa-utensils" }
                ]
            },
            2: {
                summary: "Day 2: 松島漫步與影島藝文避寒。",
                center: [35.0900, 129.0400],
                zoom: 13,
                items: [
                    { time: "10:30", title: "松島海上纜車", desc: "步行即達。水晶車廂俯瞰大海。", price: "₩22,000 (≈NT$484)", type: "sight", image: "https://picsum.photos/seed/cable_car_ocean/800/600" },
                    { time: "13:30", title: "Arte Museum", desc: "影島沉浸式藝術展，室內溫暖。", price: "已預付 NT$826", type: "sight", image: "https://picsum.photos/seed/arte_museum/800/600" },
                    { time: "17:00", title: "札嘎其海鮮市場", desc: "晚餐推薦烤魚或生魚片。", price: "預估 ₩35,000 (≈NT$770)", type: "food", image: "https://picsum.photos/seed/korea_market_food/800/600" }
                ]
            },
            3: {
                summary: "Day 3: 色彩山城，計程車代步不爬坡。",
                center: [35.0975, 129.0106],
                zoom: 14,
                items: [
                    { time: "10:30", title: "甘川洞文化村", desc: "計程車直達「遊客中心」入口。", price: "車資 ₩7,000 (≈NT$154)", type: "sight", image: "https://picsum.photos/seed/gamcheon_village/800/600" },
                    { time: "14:30", title: "白淺灘文化村", desc: "絕美海景咖啡廳 (Aether Cafe)。", price: "午茶 ₩10,000 (≈NT$220)", type: "sight", image: "https://picsum.photos/seed/white_cliff_cafe/800/600" },
                    { time: "18:00", title: "返回飯店休息", desc: "享受飯店設施。", type: "hotel", icon: "fa-bed" }
                ]
            },
            4: {
                summary: "Day 4: 海雲台奢華日，米其林美食。",
                center: [35.1600, 129.1678],
                zoom: 12,
                items: [
                    { time: "11:00", title: "移動至海雲台", desc: "計程車約50分鐘，車上補眠。", price: "車資 ₩25,000 (≈NT$550)", type: "transport", icon: "fa-taxi" },
                    { time: "15:30", title: "天空膠囊列車", desc: "尾浦站出發，私人車廂看日落。", price: "已預付 NT$849", type: "sight", image: "https://picsum.photos/seed/sky_capsule_train/800/600" },
                    { time: "17:30", title: "海木 (Haemok)", desc: "米其林推薦鰻魚飯。", price: "₩38,000 (≈NT$836)", type: "food", image: "https://picsum.photos/seed/eel_rice_bowl/800/600" }
                ]
            },
            5: {
                summary: "Day 5: 最後的韓牛，優雅賦歸。",
                center: [35.0760, 129.0170],
                zoom: 14,
                items: [
                    { time: "11:00", title: "退房 & 寄行李", desc: "飯店周邊散步。", type: "hotel", icon: "fa-suitcase" },
                    { time: "12:30", title: "松島公園 (餐廳)", desc: "午餐：高級調味牛排骨。", price: "₩45,000 (≈NT$990)", type: "food", image: "https://picsum.photos/seed/korean_beef_bbq/800/600" },
                    { time: "16:30", title: "前往機場", desc: "搭乘計程車。", price: "預估 ₩25,000 (≈NT$550)", type: "transport", icon: "fa-plane" }
                ]
            }
        };

        function init() {
            map = L.map('map', { zoomControl: false }).setView(tripData[1].center, tripData[1].zoom);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: 'OpenStreetMap'
            }).addTo(map);

            updateDay(1);
            renderExpenses();
            updateChart();
        }

        function openNaverMap() {
            if (!currentDayCenter) return;
            const lat = currentDayCenter[0];
            const lng = currentDayCenter[1];
            window.open(`https://map.naver.com/v5/?c=${lng},${lat},15,0,0,0,dh`, '_blank');
        }

        function updateDay(day) {
            currentDayCenter = tripData[day].center;
            document.querySelectorAll('.day-btn').forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
                b.classList.add('text-gray-600', 'hover:bg-gray-100');
            });
            const activeBtn = document.querySelector(`.day-btn[data-day="${day}"]`);
            activeBtn.classList.remove('text-gray-600', 'hover:bg-gray-100');
            activeBtn.classList.add('bg-indigo-600', 'text-white', 'shadow-md');

            document.getElementById('day-summary').innerText = tripData[day].summary;

            map.flyTo(tripData[day].center, tripData[day].zoom, { duration: 1.2 });
            if(activeMarker) map.removeLayer(activeMarker);
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div class='marker-pin'></div>",
                iconSize: [30, 42], iconAnchor: [15, 42]
            });
            activeMarker = L.marker(tripData[day].center, {icon: icon}).addTo(map);

            const list = document.getElementById('itinerary-list');
            list.innerHTML = '';
            tripData[day].items.forEach((item, idx) => {
                const isImageCard = !!item.image;
                const html = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden fade-in flex ${isImageCard ? 'flex-col sm:flex-row' : 'flex-row items-center'} gap-3 p-3" style="animation-delay: ${idx * 0.1}s">
                        ${isImageCard ? `<div class="h-32 sm:w-28 sm:h-auto bg-gray-200 flex-shrink-0 relative overflow-hidden group-img">
                            <img src="${item.image}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 hover:scale-110" onerror="this.src='${FALLBACK_IMAGE}'">
                        </div>` : 
                        `<div class="w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center flex-shrink-0 text-indigo-500"><i class="fa-solid ${item.icon}"></i></div>`}
                        
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start">
                                <span class="text-xs font-bold text-indigo-500">${item.time}</span>
                                ${item.price ? `<span class="text-[10px] font-bold bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded border border-indigo-100">${item.price}</span>` : ''}
                            </div>
                            <h3 class="font-bold text-gray-800 truncate mt-1">${item.title}</h3>
                            <p class="text-xs text-gray-500 line-clamp-2 mt-1">${item.desc}</p>
                        </div>
                    </div>
                `;
                list.insertAdjacentHTML('beforeend', html);
            });
        }

        function switchMainTab(tab) {
            const itineraryEl = document.getElementById('tab-itinerary');
            const financeEl = document.getElementById('tab-finance');
            const btnItinerary = document.getElementById('btn-itinerary');
            const btnFinance = document.getElementById('btn-finance');

            if (tab === 'itinerary') {
                itineraryEl.classList.remove('-translate-x-full');
                financeEl.classList.add('translate-x-full');
                financeEl.classList.remove('inset-0');
                
                btnItinerary.classList.add('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
                btnItinerary.classList.remove('text-gray-500', 'border-transparent');
                btnFinance.classList.remove('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
                btnFinance.classList.add('text-gray-500', 'border-transparent');
                
                setTimeout(() => map.invalidateSize(), 300);
            } else {
                itineraryEl.classList.add('-translate-x-full');
                financeEl.classList.remove('translate-x-full');
                financeEl.classList.add('inset-0');

                btnFinance.classList.add('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
                btnFinance.classList.remove('text-gray-500', 'border-transparent');
                btnItinerary.classList.remove('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
                btnItinerary.classList.add('text-gray-500', 'border-transparent');
                
                updateChart();
            }
        }

        function setExpenseType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                if(btn.dataset.type === type) {
                    btn.classList.add('bg-indigo-50', 'border-indigo-200', 'text-indigo-600');
                    btn.classList.remove('border-slate-200', 'text-slate-500');
                } else {
                    btn.classList.remove('bg-indigo-50', 'border-indigo-200', 'text-indigo-600', 'bg-orange-50', 'text-orange-600');
                    btn.classList.add('border-slate-200', 'text-slate-500');
                }
            });
        }

        function getPrepaidExpenses() {
            try {
                const stored = localStorage.getItem('busan_prepaid_v38');
                if (!stored) {
                    localStorage.setItem('busan_prepaid_v38', JSON.stringify(DEFAULT_PREPAID));
                    return DEFAULT_PREPAID;
                }
                return JSON.parse(stored);
            } catch { return DEFAULT_PREPAID; }
        }

        function deletePrepaid(id) {
            if(!confirm('確定要刪除這筆預付項目嗎？')) return;
            let list = getPrepaidExpenses();
            list = list.filter(item => item.id !== id);
            localStorage.setItem('busan_prepaid_v38', JSON.stringify(list));
            renderExpenses();
            updateChart();
        }

        function resetPrepaid() {
            if(!confirm('確定要將預付項目恢復為預設值嗎？')) return;
            localStorage.setItem('busan_prepaid_v38', JSON.stringify(DEFAULT_PREPAID));
            renderExpenses();
            updateChart();
        }

        function getUserExpenses() {
            try {
                return JSON.parse(localStorage.getItem('busan_user_expenses_v38')) || [];
            } catch { return []; }
        }

        function addExpense() {
            const amountKRW = parseFloat(document.getElementById('expense-amount').value);
            if (!amountKRW) return;

            const amountTWD = Math.round(amountKRW * EXCHANGE_RATE);
            const expense = {
                id: Date.now(),
                amountKRW: amountKRW,
                amountTWD: amountTWD,
                type: currentType,
                date: new Date().toLocaleDateString()
            };

            const expenses = getUserExpenses();
            expenses.unshift(expense);
            localStorage.setItem('busan_user_expenses_v38', JSON.stringify(expenses));

            document.getElementById('expense-amount').value = '';
            renderExpenses();
            updateChart();
        }

        function deleteUserExpense(id) {
            if(!confirm('確定刪除此筆新增的消費紀錄？')) return;
            let expenses = getUserExpenses();
            expenses = expenses.filter(ex => ex.id !== id);
            localStorage.setItem('busan_user_expenses_v38', JSON.stringify(expenses));
            renderExpenses();
            updateChart();
        }

        function clearUserExpenses() {
            if(!confirm('確定要清空記帳紀錄嗎？')) return;
            localStorage.removeItem('busan_user_expenses_v38');
            renderExpenses();
            updateChart();
        }

        // V38 新增：統一樣式產生器
        function getCategoryStyle(type) {
            switch(type) {
                case 'transport': return { icon: 'fa-plane', color: 'text-blue-500', bg: 'bg-blue-100' };
                case 'hotel': return { icon: 'fa-bed', color: 'text-indigo-500', bg: 'bg-indigo-100' };
                case 'ticket': return { icon: 'fa-ticket', color: 'text-teal-500', bg: 'bg-teal-100' };
                case 'food': return { icon: 'fa-utensils', color: 'text-orange-500', bg: 'bg-orange-100' };
                case 'shopping': return { icon: 'fa-bag-shopping', color: 'text-pink-500', bg: 'bg-pink-100' };
                default: return { icon: 'fa-circle-check', color: 'text-gray-500', bg: 'bg-gray-100' };
            }
        }

        function renderExpenses() {
            const list = document.getElementById('expense-list');
            const prepaidList = getPrepaidExpenses(); 
            const userList = getUserExpenses();
            let totalTWD = 0;

            const prepaidHtml = prepaidList.map(item => {
                totalTWD += item.priceTWD;
                
                // V38: 視覺統一邏輯
                const style = getCategoryStyle(item.type);
                const leftSub = item.priceKRW ? `₩${item.priceKRW.toLocaleString()}` : item.note;
                const rightPrice = `NT$${item.priceTWD.toLocaleString()}`;

                return `
                    <div class="px-4 py-3 flex justify-between items-center bg-gray-50/50 border-b border-gray-100 last:border-0 group">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-full ${style.bg} flex items-center justify-center ${style.color} text-sm shadow-sm">
                                <i class="fa-solid ${style.icon}"></i>
                            </div>
                            <div>
                                <div class="font-bold text-gray-800 text-sm">${item.title}</div>
                                <div class="text-xs text-gray-500 font-medium">${leftSub}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="font-bold text-indigo-600 text-sm">${rightPrice}</div>
                            <button onclick="deletePrepaid('${item.id}')" class="btn-delete text-gray-400 p-2" title="刪除此筆預付">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            const userHtml = userList.map(ex => {
                totalTWD += ex.amountTWD;
                
                // V38: 視覺統一邏輯
                const style = getCategoryStyle(ex.type);
                
                return `
                    <div class="px-4 py-3 flex justify-between items-center group border-b border-gray-50 last:border-0 hover:bg-gray-50">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-full ${style.bg} flex items-center justify-center ${style.color} text-sm shadow-sm">
                                <i class="fa-solid ${style.icon}"></i>
                            </div>
                            <div>
                                <div class="font-bold text-gray-800 text-sm">₩${ex.amountKRW.toLocaleString()}</div>
                                <div class="text-xs text-gray-400">≈ NT$${ex.amountTWD.toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-right">
                                <div class="font-bold text-gray-700 text-sm">NT$${ex.amountTWD.toLocaleString()}</div>
                            </div>
                            <button onclick="deleteUserExpense(${ex.id})" class="btn-delete text-gray-400 p-2">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            list.innerHTML = prepaidHtml + userHtml;
            document.getElementById('header-total').innerText = "NT$" + totalTWD.toLocaleString();
            document.getElementById('chart-total').innerText = totalTWD.toLocaleString();
        }

        function updateChart() {
            const ctx = document.getElementById('budgetChart').getContext('2d');
            const prepaidList = getPrepaidExpenses();
            const userList = getUserExpenses();
            
            let dataMap = { 'food': 0, 'transport': 0, 'shopping': 0, 'hotel': 0, 'ticket': 0, 'other': 0 };
            
            prepaidList.forEach(p => {
                if (dataMap[p.type] !== undefined) dataMap[p.type] += p.priceTWD;
                else dataMap.other += p.priceTWD;
            });

            userList.forEach(ex => {
                if (dataMap[ex.type] !== undefined) dataMap[ex.type] += ex.amountTWD;
                else dataMap.other += ex.amountTWD;
            });

            const dataValues = [dataMap.food, dataMap.transport, dataMap.shopping, dataMap.hotel, dataMap.ticket, dataMap.other];

            if (budgetChart) budgetChart.destroy();

            budgetChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['餐飲', '交通', '購物', '住宿', '門票', '其他'],
                    datasets: [{
                        data: dataValues,
                        backgroundColor: ['#f97316', '#3b82f6', '#ec4899', '#6366f1', '#14b8a6', '#64748b'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: { legend: { display: false } }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
